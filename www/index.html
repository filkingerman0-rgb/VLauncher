<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>VLauncher Multi</title>
    <style>
        /* ПОДКЛЮЧАЕМ ТВОЙ МАЙНКРАФТЕРСКИЙ ШРИФТ */
        @font-face {
            font-family: 'Minecraft';
            src: url('minecraft_font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            font-family: 'Minecraft', sans-serif; /* Применяем шрифт ко всему лаунчеру! */
        }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000 url('background.png') no-repeat center center; 
            background-size: cover;
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ С ТРЕМЯ КНОПКАМИ ИЗ СКРИНШОТА */
        .top-bar {
            position: absolute; top: 5%; left: 3%; right: 3%;
            display: flex; align-items: center; justify-content: space-between;
        }
        .controls-group { display: flex; gap: 10px; align-items: center; }
        
        .small-btn {
            height: 45px; padding: 0 15px; font-size: 13px; font-weight: bold;
            color: white; text-shadow: 2px 2px 0px #3f3f3f; cursor: pointer;
            background: url('btn_normal.png') no-repeat center center; background-size: 100% 100%;
            border: none; image-rendering: pixelated; display: flex; align-items: center; justify-content: center;
        }
        .small-btn:active { background: url('btn_pressed.png') no-repeat center center; background-size: 100% 100%; }
        
        .build-select {
            height: 45px; padding: 0 10px; font-size: 13px; font-weight: bold;
            color: white; background: rgba(0, 0, 0, 0.7); border: 2px solid #55ff55;
            border-radius: 5px; cursor: pointer; outline: none; min-width: 190px;
        }
        .build-select option { background: #222; color: white; }

        /* КНОПКА-КРИПЕР */
        .btn-folder {
            width: 60px; height: 60px;
            background: url('btn_folder.png') no-repeat center center; background-size: contain;
            border: none; cursor: pointer; image-rendering: pixelated;
        }

        /* ГЛАВНАЯ КНОПКА ИГРАТЬ СНИЗУ */
        .bottom-bar {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 400px;
        }
        .main-btn {
            width: 100%; height: 65px; border: none; font-size: 20px; font-weight: bold;
            color: white; text-shadow: 2px 2px 0px #3f3f3f; cursor: pointer;
            background: url('btn_normal.png') no-repeat center center; background-size: 100% 100%;
            image-rendering: pixelated; display: flex; align-items: center; justify-content: center;
        }
        .main-btn:active { background: url('btn_pressed.png') no-repeat center center; background-size: 100% 100%; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="controls-group">
            <button class="small-btn" onclick="triggerJarSelect()">Загрузить загрузчик модов</button>
            <input type="file" id="jar-input" accept=".jar" onchange="handleJarLoad(this)">

            <button class="small-btn" onclick="triggerZipSelect()">Загрузить сборку</button>
            <input type="file" id="zip-input" accept=".zip" onchange="handleZipLoad(this)">

            <select class="build-select" id="build-selector">
                <option value="Vanilla_1.20.1">Ванилла (1.20.1)</option>
                <option value="DebtHunt">DebtHunt</option>
                <option value="FabricMods">FabricMods</option>
            </select>
        </div>
        <button class="btn-folder" onclick="openStorage()"></button>
    </div>

    <div class="bottom-bar">
        <button class="main-btn" onclick="launchGame()">Играть</button>
    </div>

    <script>
        function triggerJarSelect() { document.getElementById('jar-input').click(); }
        function triggerZipSelect() { document.getElementById('zip-input').click(); }

        function handleJarLoad(input) {
            if (input.files.length === 0) return;
            alert("Загрузчик модов добавлен!");
        }

        function handleZipLoad(input) {
            if (input.files.length === 0) return;
            const minecraftName = prompt("Как назвать этот Майнкрафт?", "Сборка_Вики");
            if (minecraftName === null || minecraftName.trim() === "") return;
            
            const selector = document.getElementById('build-selector');
            const newOption = new Option(minecraftName, minecraftName);
            selector.add(newOption);
            selector.value = minecraftName;
            
            alert("Сборка добавлена: Documents/VLauncher/" + minecraftName);
        }

        function getProfilePath(profile) {
            return "file:///storage/emulated/0/Documents/VLauncher/" + profile + "/.minecraft";
        }

        function launchGame() {
            const selector = document.getElementById('build-selector');
            const selectedProfile = selector.value;
            let version = "1.20.1";
            if (selectedProfile === "DebtHunt") version = "1.12.2";
            
            runPojav(version, selectedProfile);
        }

        function runPojav(version, profile) {
            const gameDir = getProfilePath(profile);
            
            // Прямая сшивка с нативным встроенным компонентом игры!
            if (window.plugins && window.plugins.launcher) {
                window.plugins.launcher.launch({
                    packageName: 'org.wolf.vlauncher', // Запускаем движок прямо внутри нашего APK!
                    dataType: 'application/octet-stream',
                    extras: { 'version': version, 'profile': profile, 'gameDir': gameDir }
                }, function() {
                    console.log("Встроенная игра запущена!");
                }, function(err) {
                    // Страховочный мост, если система запросит внешний пакет
                    window.plugins.launcher.launch({
                        packageName: 'net.kdt.pojavlaunch',
                        extras: { 'version': version, 'profile': profile, 'gameDir': gameDir }
                    });
                });
            } else {
                alert("Запуск профиля: " + profile + " (Версия: " + version + ")");
            }
        }

        function openStorage() {
            if (window.plugins && window.plugins.launcher) {
                window.plugins.launcher.launch({ packageName: 'com.android.documentsui' });
            } else {
                alert("Папка лаунчера: Documents/VLauncher");
            }
        }
    </script>
</body>
</html>
