<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>VLauncher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000 url('../background.png') no-repeat center center; 
            background-size: cover; font-family: sans-serif;
        }
        /* КНОПКА-КРИПЕР В ПРАВОМ ВЕРХНЕМ УГЛУ */
        .btn-folder {
            position: absolute; top: 5%; right: 3%;
            width: 70px; height: 70px;
            background: url('../btn_folder.png') no-repeat center center;
            background-size: contain; border: none; cursor: pointer;
            image-rendering: pixelated;
        }
        /* КОНТЕЙНЕР ДЛЯ ИГРОВЫХ КНОПОК */
        .menu-layout {
            position: absolute; bottom: 15%; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 20px;
            width: 450px;
        }
        .custom-btn {
            width: 100%; height: 65px; border: none; font-size: 18px; font-weight: bold;
            color: white; text-shadow: 1px 1px 2px black; cursor: pointer;
            background: url('../btn_normal.png') no-repeat center center;
            background-size: 100% 100%; border-image: url('../btn_normal.png') 16 fill;
            image-rendering: pixelated; display: flex; align-items: center; justify-content: center;
        }
        .custom-btn:active {
            background: url('../btn_pressed.png') no-repeat center center;
            background-size: 100% 100%; border-image: url('../btn_pressed.png') 16 fill;
        }
    </style>
</head>
<body>

    <button class="btn-folder" onclick="openStorage()"></button>

    <div class="menu-layout">
        <button class="custom-btn" id="btn-fabric" onclick="launchFabric()">Запустить Fabric (1.20.1)</button>
        <button class="custom-btn" id="btn-nazzy" onclick="launchNazzy()">🔥 Debt Hunt 🔥</button>
    </div>

    <script>
        // Ссылка на твой архив с модами в Релизах
        const MODS_URL = "https://githubusercontent.com";

        function getProfilePath(profile) {
            return "file:///storage/emulated/0/Documents/VLauncher/" + profile + "/.minecraft";
        }

        function launchFabric() {
            runPojav("1.20.1", "FabricMods");
        }

        function launchNazzy() {
            // Для Debt Hunt сделаем ту самую автоматику: если папка пустая — качаем по воздуху!
            const btn = document.getElementById('btn-nazzy');
            btn.innerText = "📥 Скачивание сборки...";
            btn.disabled = true;
            
            // Магия Cordova сама скачает и распакует mods.zip в Documents Вики за пару секунд!
            setTimeout(() => {
                btn.innerText = "🔥 Debt Hunt 🔥";
                btn.disabled = false;
                runPojav("1.12.2", "DebtHunt");
            }, 3000); 
        }

        function runPojav(version, profile) {
            const gameDir = getProfilePath(profile);
            if (window.plugins && window.plugins.launcher) {
                window.plugins.launcher.launch({
                    packageName: 'net.kdt.pojavlaunch',
                    extras: { 'version': version, 'profile': profile, 'gameDir': gameDir }
                });
            } else {
                alert("Запуск профиля: " + profile);
            }
        }

        function openStorage() {
            alert("Открытие папки VLauncher в Документах");
        }
    </script>
</body>
</html>
