name: Build VolkAufEngine Ultimate JS
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Create Cordova Project
        run: |
          cordova create vlauncher org.wolf.volkaufengine VolkAufEngine
          cd vlauncher
          cordova platform add android
          
          # Настраиваем строго горизонтальный экран и кастомную иконку
          sed -i '/<\/widget>/i \    <preference name="Orientation" value="landscape" />' config.xml
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" />' config.xml
          
          cordova plugin add cordova-plugin-launcher
          rm -rf www/*
          cp -r ../www/* www/
          cordova build android --device
      - name: Upload VolkAufEngine APK
        uses: actions/upload-artifact@v4
        with:
          name: VolkAufEngine-APK
          path: vlauncher/platforms/android/app/build/outputs/apk/debug/*.apk
