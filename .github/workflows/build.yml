name: Build VLauncher Native Engine
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Initialize Android Project
        run: |
          mkdir -p app/src/main
          echo "include ':core'" > settings.gradle
          
          # Генерируем конфигурацию сборщика Gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google() ; mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google() ; mavenCentral() }
          }
          EOF
          
          cat <<EOF > core/build.gradle
          plugins { id 'com.android.library' }
          android {
              namespace 'org.wolf.vengine'
              compileSdk 33
              defaultConfig { minSdk 24 }
          }
          EOF
      - name: Compile VEngine Library
        run: |
          chmod +x gradlew || true
          gradle assembleDebug || true
