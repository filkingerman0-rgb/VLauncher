name: Build VLauncher
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libreadline-dev libsqlite3-dev libssl-dev libgdbm-dev libdb-dev libpcap-dev xz-utils libffi-dev
          pip3 install --upgrade buildozer cython kivy
      - name: Hardcore Accept Android Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses || true
          echo -e "\n24431f66315b74744137e81cc374d326c924ac0d" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          yes | buildozer android licenses || true
      - name: Build APK with Buildozer
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          buildozer -v android debug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLauncher-APK
          path: bin/*.apk
      
