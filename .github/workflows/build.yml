name: Build VLauncher
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:master
    steps:
      - uses: actions/checkout@v4
      - name: Build APK with Cyborg Buildozer
        run: |
          buildozer -v android debug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLauncher-APK
          path: bin/*.apk
