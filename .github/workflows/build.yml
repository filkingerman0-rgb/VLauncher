name: Build VLauncher
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libreadline-dev libsqlite3-dev libssl-dev libgdbm-dev libdb-dev libpcap-dev xz-utils libffi-dev
          pip3 install --upgrade buildozer cython kivy
      - name: Build APK with Safe Auto Accept
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          yes y 2>/dev/null | buildozer -v android debug || true
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VLauncher-APK
          path: bin/*.apk
