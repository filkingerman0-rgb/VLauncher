name: Build VolkAufEngine Native
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Initialize Android Project
        run: |
          mkdir -p core/src/main/java/org/wolf/volkaufengine
          echo "include ':core'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google() ; mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google() ; mavenCentral() }
          }
          EOF
      - name: Compile VolkAufEngine APK
        run: |
          # Используем встроенный глобальный компилятор Gradle, чтобы не зависеть от файлов в корне
          gradle assembleDebug --stacktrace
      - name: Upload VolkAufEngine APK
        uses: actions/upload-artifact@v4
        with:
          name: VolkAufEngine-APK
          path: "core/build/outputs/apk/debug/*.apk"
