plugins { id 'com.android.library' }

android {
    namespace 'org.wolf.vengine'
    compileSdk 33
    defaultConfig {
        minSdk 24
        // Указываем архитектуру процессоров MediaTek для Samsung и Redmi
        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a' }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // Подключаем нативное ядро LWJGL для отрисовки графики Майнкрафта через GLES3
    implementation 'org.lwjgl:lwjgl:3.3.1'
    implementation 'org.lwjgl:lwjgl-opengles:3.3.1'
}
