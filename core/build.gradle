plugins { id 'com.android.application' }

android {
    namespace 'org.wolf.volkaufengine'
    compileSdk 33
    defaultConfig {
        applicationId "org.wolf.volkaufengine"
        minSdk 24
        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a' }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // Подключаем интерфейс под наши XML-кнопки со скриншота
    implementation 'androidx.appcompat:appcompat:1.6.1'
    
    // Нативное игровое ядро LWJGL
    implementation 'org.lwjgl:lwjgl:3.3.1'
    implementation 'org.lwjgl:lwjgl-opengles:3.3.1'
}
